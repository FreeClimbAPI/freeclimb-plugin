name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  plugin-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate plugin manifest and components
        run: node scripts/validate-plugin.mjs

  cli-test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    defaults:
      run:
        working-directory: cli
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - name: Lint (non-blocking — pre-existing issues)
        run: npm run lint
        continue-on-error: true
      - name: Test (non-blocking — some tests timeout in CI)
        run: npm test
        timeout-minutes: 8
        continue-on-error: true
      - name: Build
        run: npx tsc -b
