name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  plugin-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Validate plugin manifest and components
        run: node scripts/validate-plugin.mjs
      - name: Scan for credential-shaped secrets
        run: node scripts/scan-secrets.mjs

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build workspace (core -> mcp -> cli)
        run: pnpm build
      - name: Verify MCP entry point built
        run: test -f mcp/lib/bin.js

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [22]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build workspace
        run: pnpm build
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test
        timeout-minutes: 8

  sdk-templates:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - sdk: node
            directory: templates/node-express
            command: npm ci && npm test
          - sdk: python
            directory: templates/python-flask
            command: python -m pip install -r requirements-dev.txt && python -m pytest
          - sdk: java
            directory: templates/java-spring
            command: mvn --batch-mode test
          - sdk: dotnet
            directory: templates/dotnet-minimal
            command: dotnet restore tests/FreeClimbStarter.Tests.csproj --locked-mode && dotnet test tests/FreeClimbStarter.Tests.csproj --no-restore
          - sdk: ruby
            directory: templates/ruby-sinatra
            command: bundle install && bundle exec rspec
          - sdk: php
            directory: templates/php-slim
            command: composer install --no-interaction --no-progress && composer test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        if: matrix.sdk == 'node'
        with:
          node-version: 22
      - uses: actions/setup-python@v6
        if: matrix.sdk == 'python'
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v5
        if: matrix.sdk == 'java'
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - uses: actions/setup-dotnet@v5
        if: matrix.sdk == 'dotnet'
        with:
          dotnet-version: "8.0.x"
      - uses: ruby/setup-ruby@v1
        if: matrix.sdk == 'ruby'
        with:
          ruby-version: "3.3"
      - uses: shivammathur/setup-php@v2
        if: matrix.sdk == 'php'
        with:
          php-version: "8.3"
          tools: composer
      - name: Test ${{ matrix.sdk }} SDK template
        working-directory: ${{ matrix.directory }}
        run: ${{ matrix.command }}
